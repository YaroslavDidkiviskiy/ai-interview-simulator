name: Deploy to GCP

on:
  push:
    branches: [main]

env:
  PROJECT_ID: project-fb1dbd79-74b7-4cd6-93e
  REGION: europe-west1
  BACKEND_IMAGE: europe-west1-docker.pkg.dev/project-fb1dbd79-74b7-4cd6-93e/prepario/backend
  FRONTEND_IMAGE: europe-west1-docker.pkg.dev/project-fb1dbd79-74b7-4cd6-93e/prepario/frontend

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build and push backend
        run: |
          docker build -t ${{ env.BACKEND_IMAGE }}:${{ github.sha }} -t ${{ env.BACKEND_IMAGE }}:latest .
          docker push ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend
        run: |
          docker build -t ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} -t ${{ env.FRONTEND_IMAGE }}:latest ./frontend
          docker push ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.FRONTEND_IMAGE }}:latest

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy prepario-backend \
            --image=${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8000 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=3 \
            --set-env-vars="DEBUG=False,APP_NAME=${{ secrets.APP_NAME }},DATABASE_URL=${{ secrets.DATABASE_URL }},REDIS_URL=${{ secrets.REDIS_URL }},SECRET_KEY=${{ secrets.SECRET_KEY }},GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},EVALUATOR_PROVIDER=${{ secrets.EVALUATOR_PROVIDER }},GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }},GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }},GITHUB_CLIENT_ID=${{ secrets.OAUTH_GITHUB_CLIENT_ID }},GITHUB_CLIENT_SECRET=${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }},BACKEND_URL=${{ secrets.BACKEND_URL }},FRONTEND_URL=${{ secrets.FRONTEND_URL }},ACCESS_EXPIRE_MIN=${{ secrets.ACCESS_EXPIRE_MIN }},REFRESH_EXPIRE_DAYS=${{ secrets.REFRESH_EXPIRE_DAYS }}"

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy prepario-frontend \
            --image=${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=80 \
            --memory=256Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=2

      - name: Print URLs
        run: |
          echo "Backend URL:"
          gcloud run services describe prepario-backend --region=${{ env.REGION }} --format='value(status.url)'
          echo "Frontend URL:"
          gcloud run services describe prepario-frontend --region=${{ env.REGION }} --format='value(status.url)'